<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Developer Explorer</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">DevExplorer.</h1>
            <form id="search-form" class="search-form">
                <input type="text" id="username-input" placeholder="Enter GitHub username..." required />
                <button type="submit" class="btn">Search</button>
            </form>
        </div>
    </header>

    <main class="main-content">
        <!-- Spinner placeholder -->
        <div id="loading-spinner" class="loading-spinner"></div>
        
        <div class="grid-layout">
            <!-- Sidebar: Profile & Language Stats -->
            <div class="sidebar-grid">
                <div id="profile-card" class="card"></div>
                <div id="language-stats" class="card"></div>
            </div>

            <!-- Repositories List with Sorting -->
            <div class="repos-grid">
                <div class="repos-header">
                    <h2>Repositories</h2>
                    <div class="sort-container">
                        <label for="sort-select">Sort by:</label>
                        <select id="sort-select" class="select-dropdown">
                            <option value="stars">Stars</option>
                            <option value="forks">Forks</option>
                            <option value="recent">Recent</option>
                        </select>
                    </div>
                </div>
                <div id="repo-list"></div>
            </div>
        </div>
    </main>
</body>
</html>
