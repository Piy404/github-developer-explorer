<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Developer Explorer</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">DevExplorer.</h1>
            
            <form id="search-form" class="search-form">
                <input type="text" id="username-input" placeholder="Enter GitHub username..." required />
                <button type="submit" class="btn">Search</button>
            </form>
        </div>
    </header>

    <main class="main-content">
        <div id="error-display" class="error-display" style="display: none;"></div>
        <div id="loading-spinner" class="loading-spinner" style="display: none;"></div>
        
        <div class="grid-layout">
            
            <div class="sidebar-grid">
                <div id="profile-card" class="card"></div>
                <div id="language-stats" class="card"></div>
            </div>

            <div class="content-grid">
                <div class="sort-controls">
                    <select id="sort-dropdown">
                        <option value="stars">Highest Stars</option>
                        <option value="forks">Highest Forks</option>
                        <option value="recent">Recently Updated</option>
                    </select>
                </div>
                <div id="repo-list" class="repo-list"></div>
            </div>
            
        </div>
    </main>
</body>
</html>
