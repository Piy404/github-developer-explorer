<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Developer Explorer</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>GitHub Developer Explorer</h1>
            <form id="search-form" class="search-form">
                <input type="text" id="username-input" placeholder="Enter GitHub username..." required />
                <button type="submit" class="btn">Search</button>
            </form>
        </header>

        <main class="app-main">
            <div id="loading-spinner" class="loading-spinner" style="display: none;"></div>
            <div id="error-display" class="error-display" style="display: none;"></div>
            <div id="profile-container" class="profile-container"></div>
        </main>
    </div>
</body>
</html>
